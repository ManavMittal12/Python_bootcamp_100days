<!--
Understanding Ordered or Unordered List


# Unordered List
they go on separate lines, and we need another tag to complete it -

# Unordered List tag + List items tag
<ul>All the items are enclosed in these unordered list.
    <li></li>   # These are the list items and each of them contains some piece of content
    <li></li>
</ul>


# Ordered List
same as the unordered list, just that they are ordered

# Ordered list tag + list items tag
<ol>
    <li>Flour</li>
    <li>Vegetables</li>
</ol>
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <ul>
        <li>Banana</li>
        <li>Apple</li>
    </ul>

    <ol>
        <li>Flour</li>
        <li>Vegetables</li>
    </ol>
</body>
</html>
