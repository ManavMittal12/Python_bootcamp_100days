<!--
Image Element

The image element looks like this

It's also a void element, it's a self-closing tag.
<img src="url" />
src attribute is the location of the image
                                            This is the size
<img src="https://picsum.photos/seed/picsum/200/300">

there's an alt attribute as well.
it takes an alternative text provided.


<img src="https://picsum.photos/seed/picsum/200/300" alt="mountain photo">
-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <img src="https://picsum.photos/seed/picsum/600/300" alt="mountain photo">
</body>
</html>
