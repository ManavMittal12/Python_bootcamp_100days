<!--Nesting and Indentation

We can indent a list into another list
when we write the nested lists, indentation of the code becomes super important.

<ul>
    <li></li>
    <li></li>
        <ul>
            <li></li>
            <li></li>
        </ul>
</ul>

That's how the multiline nesting works.

we can nest, ordered list in unordered list and vice versa

--->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <ul>
        <li>A</li>
        <li>B
            <ol>
                <li>B1</li>
                <li>B2
                    <ul>
                        <li>B2a
                            <ul>
                                <li>B2aa</li>
                                <li>B2ab</li>
                            </ul>
                        </li>
                        <li>B2b</li>
                        <li>B2c</li>
                    </ul>
                </li>
                <li>B3
                    <ul>
                        <li>B31</li>
                        <li>B32</li>
                    </ul>
                </li>
            </ol>
        </li>
        <li>C</li>
    </ul>
</body>
</html>
