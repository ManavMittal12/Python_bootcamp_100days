<!--Anchor Elements
<a>This is a link</a>   but this is not an active hyperlink
# what we need is an additional attribute
# it goes in the opening tag

<a href = "link">This is a link</a>

# the way we structure an attribute looks like this
<tag attribute=value another=attribute>Content</tag>
we can have multiple attributes as well.


href = means where the attribute should go to.

we can also apply global attribute to any given element.
-->
